<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Мой сайт</title>

    <link rel="stylesheet" href="/styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <a href="#home">Главная</a></li>
            <a href="#about">Страница2</a></li>
            <a href="#services">Страница3</a></li>
            <a href="#contact">Страница4</a></li>
        </nav>

        <input
            type="text"
            id="search-input"
            placeholder="Поиск товара..."
            class="search-input"
        />
        <button id="theme-switch">Темка</button>
    </header>
    <main>
        
        <section class="product-cards">
            <!-- Карточки будут загружены динамически из app.js -->
        </section>
    </main>
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Создание товара</h2>

            <form id="product-form">
            <input name="name" placeholder="Название" required>
            <input name="category" placeholder="Категория">
            <textarea name="description" placeholder="Описание"></textarea>
            <input name="price" type="number" placeholder="Цена">
            <input name="stock" type="number" placeholder="Количество">

            <div class="modal-actions">
                <button type="button" id="close-modal">Отмена</button>
                <button type="submit">Сохранить</button>
            </div>
            </form>
        </div>
    </div>
    <footer>
        <p>Футер. Все права защищены и тд.</p>
    </footer>
</body>
</html>
